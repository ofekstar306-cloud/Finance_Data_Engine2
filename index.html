<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Reporter | Soft Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Assistant', sans-serif; 
            /* רקע בהיר, רך וחמים - שילוב פסטלים עדין */
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #4a4a4a;
        }

        /* Light Glassmorphism Panel */
        .glass-panel-light {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 40px rgba(244, 143, 177, 0.15); /* צל ורדרד עדין */
        }

        /* Soft Input Fields */
        .soft-input {
            background: rgba(255, 255, 255, 0.8) !important;
            border: 1px solid #f8bbd0 !important; /* גבול ורוד פסטל */
            color: #4a4a4a !important;
            transition: all 0.3s ease;
        }
        .soft-input:focus {
            border-color: #ec407a !important; /* ורוד חזק יותר בפוקוס */
            box-shadow: 0 0 12px rgba(236, 64, 122, 0.2) !important;
            background: rgba(255, 255, 255, 1) !important;
        }

        /* Feminine Gradient Button (Peach to Lilac) */
        .soft-gradient-button {
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%); /* ורוד אפרסק רך */
            color: white;
            transition: transform 0.2s ease, box-shadow 0.3s ease;
            position: relative;
            z-index: 1;
        }
        .soft-gradient-button:hover {
            box-shadow: 0 5px 20px rgba(255, 154, 158, 0.4);
            transform: translateY(-2px);
            background: linear-gradient(45deg, #f8bbd0 0%, #e1bee7 100%); /* מעבר לורוד-סגול רך ב-Hover */
        }
        .soft-gradient-button:active {
            transform: translateY(1px) scale(0.98);
        }

        /* Custom Styling for the date picker icon color */
        ::-webkit-calendar-picker-indicator {
            filter: invert(40%) sepia(80%) saturate(300%) hue-rotate(320deg) brightness(95%) contrast(90%);
        }

        /* Loading Spinner Color */
        .spinner-soft {
            border-top-color: #ff9a9e;
            animation: spinner 0.8s linear infinite;
        }
        @keyframes spinner {
            to {transform: rotate(360deg);}
        }

    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="max-w-2xl w-full glass-panel-light rounded-3xl overflow-hidden shadow-xl border border-white/50">
        
        <div class="p-10 text-center relative border-b border-pink-100/50 bg-white/30">
            <div class="absolute inset-0 opacity-10 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiNmNDhmYjEiIGZpbGwtb3BhY2l0eT0iMC40Ij48cGF0aCBkPSJNMCAwaDQwdjQwaC00MFYwek0yMCAyMGgyMHYyMEgtMjBWMjB6TTAgMjBoMjB2MjBIMFYyMHoyMCAwaDIwdjIwSDIwVjB6Ii8+PC9nPjwvZz48L3N2Zz4=')]">
                </div>
            
            <div class="relative z-10 flex flex-col items-center">
                <div class="p-4 bg-pink-100 rounded-full mb-4 border-2 border-pink-200 shadow-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-pink-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </div>
                <h1 class="text-4xl font-bold text-gray-800 mb-2">דוחות מניות חכמים</h1>
                <p class="text-pink-700/80 text-lg font-medium">איחוד נתונים מ-Yahoo ו-Google לגיליון מאוחד</p>
            </div>
        </div>

        <form id="stockForm" class="p-8 space-y-7 bg-white/20">
            
            <div>
                <label class="block text-gray-700 font-semibold mb-2 text-lg">סימולי מניות (למשל: TSLA, AAPL):</label>
                <input type="text" id="tickers" placeholder="הפרד בפסיק..." required
                    class="w-full px-5 py-4 rounded-xl soft-input outline-none transition-all text-lg font-mono placeholder:text-pink-300">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-7">
                <div>
                    <label class="block text-gray-700 font-semibold mb-2 text-lg">תאריך התחלה:</label>
                    <input type="date" id="startDate" required
                        class="w-full px-4 py-3 rounded-xl soft-input outline-none text-gray-700">
                </div>
                <div>
                    <label class="block text-gray-700 font-semibold mb-2 text-lg">תאריך סיום:</label>
                    <input type="date" id="endDate" required
                        class="w-full px-4 py-3 rounded-xl soft-input outline-none text-gray-700">
                </div>
            </div>

            <div>
                <label class="block text-gray-700 font-semibold mb-2 text-lg">תדירות:</label>
                <select id="frequency" class="w-full px-4 py-3 rounded-xl soft-input outline-none bg-white">
                    <option value="1d">יומי (Daily)</option>
                    <option value="1wk">שבועי (Weekly)</option>
                    <option value="1mo">חודשי (Monthly)</option>
                </select>
            </div>

            <button type="submit" id="submitBtn" 
                class="w-full font-bold py-5 rounded-2xl shadow-lg soft-gradient-button flex justify-center items-center text-xl active:scale-95">
                <span id="btnText">צור גיליון נתונים</span>
                <div id="loader" class="hidden mr-3 spinner-soft h-6 w-6 border-4 border-transparent rounded-full"></div>
            </button>
        </form>

        <div id="resultArea" class="hidden p-8 border-t border-pink-100/50 bg-white/40 rounded-b-3xl">
            <div class="bg-pink-50 border border-pink-100 p-6 rounded-2xl text-center shadow-inner">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-white text-pink-500 rounded-full mb-5 border-2 border-pink-100 shadow">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <h3 class="text-2xl font-bold text-gray-800 mb-3">הבקשה עובדה בהצלחה!</h3>
                <p class="text-gray-600 mb-7 leading-relaxed text-lg">
                    הגיליון המאוחד נוצר כעת ב-Google Drive שלך.<br>
                    חפש קובץ ששמו מתחיל ב-<b>"Financial Export"</b>.
                </p>
                <a href="https://drive.google.com/drive/recent" target="_blank" 
                    class="inline-block bg-white hover:bg-pink-50 text-pink-600 font-bold py-4 px-12 rounded-full shadow-md transition-colors text-lg border-2 border-pink-100">
                    צפה בקבצים האחרונים ב-Drive
                </a>
            </div>
        </div>
    </div>

    <script>
        // שומר על הפונקציונליות המקורית
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxiQnCjIO4qLdeadQRdkkAjiRJxLOV2Px7c2gPCD4iCQ9HfVDIS8dH18ClQ_Lv3W_Mn/exec';

        document.getElementById('stockForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const resultArea = document.getElementById('resultArea');

            const payload = {
                tickers: document.getElementById('tickers').value.split(',').map(s => s.trim().toUpperCase()),
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                frequency: document.getElementById('frequency').value
            };

            submitBtn.disabled = true;
            btnText.innerText = "מעבד נתונים...";
            loader.classList.remove('hidden');
            resultArea.classList.add('hidden');

            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });

                setTimeout(() => {
                    submitBtn.disabled = false;
                    btnText.innerText = "צור גיליון נתונים";
                    loader.classList.add('hidden');
                    resultArea.classList.remove('hidden');
                    resultArea.scrollIntoView({ behavior: 'smooth' });
                }, 2000);

            } catch (error) {
                console.error("Error sending request:", error);
                alert("אירעה שגיאה בשליחת הבקשה.");
                submitBtn.disabled = false;
                btnText.innerText = "צור גיליון נתונים";
                loader.classList.add('hidden');
            }
        });

        // Set Default Dates
        const today = new Date();
        const thirtyDaysAgo = new Date();
        thirtyDaysAgo.setDate(today.getDate() - 30);
        document.getElementById('endDate').value = today.toISOString().split('T')[0];
        document.getElementById('startDate').value = thirtyDaysAgo.toISOString().split('T')[0];
    </script>
</body>
</html>
