<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Reporter | Ofek Cohen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Assistant', sans-serif; 
            /* רקע עתידני רך המשלב כחול עמוק עם סגול/וורוד */
            background: radial-gradient(circle at center, #1a1a2e 0%, #10101a 100%);
            min-height: screen;
            color: #fce4ec;
        }

        /* Glassmorphism Effect */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 192, 203, 0.1);
            box-shadow: 0 8px 32px 0 rgba(255, 182, 193, 0.1);
        }

        /* Neon Text Glow */
        .neon-text-feminine {
            color: #f8bbd0;
            text-shadow: 0 0 5px #f8bbd0, 0 0 10px #f8bbd0, 0 0 20px #e91e63;
        }

        /* Gradient Borders and Inputs */
        .feminine-input {
            background: rgba(0, 0, 0, 0.2) !important;
            border: 1px solid rgba(244, 143, 177, 0.3) !important;
            color: #fce4ec !important;
            transition: all 0.3s ease;
        }
        .feminine-input:focus {
            border-color: #f48fb1 !important;
            box-shadow: 0 0 10px rgba(244, 143, 177, 0.4) !important;
            background: rgba(0, 0, 0, 0.4) !important;
        }

        /* Feminine Gradient Button with Animated Glow */
        .feminine-button {
            background: linear-gradient(45deg, #ec407a, #9c27b0);
            position: relative;
            z-index: 1;
            transition: transform 0.2s ease, box-shadow 0.3s ease;
            overflow: hidden;
        }
        .feminine-button::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #ff80ab, #ba68c8);
            opacity: 0;
            z-index: -1;
            transition: opacity 0.4s ease;
        }
        .feminine-button:hover {
            box-shadow: 0 0 20px rgba(236, 64, 122, 0.6);
            transform: translateY(-2px);
        }
        .feminine-button:hover::before {
            opacity: 1;
        }
        .feminine-button:active {
            transform: translateY(1px) scale(0.98);
        }

        /* Success Card with Soft Rose Glow */
        .success-card {
            border: 1px solid rgba(129, 199, 132, 0.4);
            box-shadow: 0 0 15px rgba(129, 199, 132, 0.2);
            background: rgba(76, 175, 80, 0.05);
        }

        /* CSS for the Loading Spinner */
        .spinner {
            border-top-color: #fce4ec;
            animation: spinner 0.8s linear infinite;
        }
        @keyframes spinner {
            to {transform: rotate(360deg);}
        }

    </style>
</head>
<body class="flex items-center justify-center p-4 min-h-screen">

    <div class="max-w-2xl w-full glass-panel rounded-3xl overflow-hidden p-1 bg-gradient-to-br from-pink-500/10 via-purple-500/10 to-blue-500/10">
        
        <div class="relative p-10 text-center overflow-hidden border-b border-pink-500/10">
            <div class="absolute inset-0 opacity-10">
                <svg width="100%" height="100%"><defs><pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M 20 0 L 0 0 0 20" fill="none" stroke="#f48fb1" stroke-width="0.5"/></pattern></defs><rect width="100%" height="100%" fill="url(#grid)" /></svg>
            </div>
            <div class="relative z-10 flex flex-col items-center">
                <div class="p-4 bg-pink-900/30 rounded-full mb-4 border border-pink-500/20 shadow-lg" style="box-shadow: 0 0 15px rgba(244,143,177,0.2);">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-pink-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </div>
                <h1 class="text-4xl font-bold text-white neon-text-feminine mb-2">דוחות מניות חכמים</h1>
                <p class="text-pink-100/80 text-lg">איחוד נתונים מ-Yahoo ו-Google לגיליון מאוחד</p>
            </div>
        </div>

        <form id="stockForm" class="p-8 space-y-7">
            
            <div>
                <label class="block text-pink-100 font-semibold mb-2 text-lg">סימולי מניות (למשל: TSLA, AAPL):</label>
                <input type="text" id="tickers" placeholder="הפרד בפסיק..." required
                    class="w-full px-5 py-4 rounded-xl feminine-input outline-none transition-all text-lg font-mono placeholder:text-pink-300/40">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-7">
                <div>
                    <label class="block text-pink-100 font-semibold mb-2 text-lg">תאריך התחלה:</label>
                    <input type="date" id="startDate" required
                        class="w-full px-4 py-3 rounded-xl feminine-input outline-none">
                </div>
                <div>
                    <label class="block text-pink-100 font-semibold mb-2 text-lg">תאריך סיום:</label>
                    <input type="date" id="endDate" required
                        class="w-full px-4 py-3 rounded-xl feminine-input outline-none">
                </div>
            </div>

            <div>
                <label class="block text-pink-100 font-semibold mb-2 text-lg">תדירות:</label>
                <select id="frequency" class="w-full px-4 py-3 rounded-xl feminine-input outline-none bg-black/40">
                    <option value="1d">יומי (Daily)</option>
                    <option value="1wk">שבועי (Weekly)</option>
                    <option value="1mo">חודשי (Monthly)</option>
                </select>
            </div>

            <button type="submit" id="submitBtn" 
                class="w-full text-white font-bold py-5 rounded-2xl shadow-xl feminine-button flex justify-center items-center text-xl">
                <span id="btnText">הפק גיליון נתונים</span>
                <div id="loader" class="hidden mr-3 spinner h-6 w-6 border-4 border-transparent rounded-full"></div>
            </button>
        </form>

        <div id="resultArea" class="hidden p-8 border-t border-pink-500/10 rounded-b-3xl">
            <div class="success-card p-6 rounded-2xl text-center">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-green-900/30 text-green-300 rounded-full mb-5 border border-green-700/40 shadow-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <h3 class="text-2xl font-bold text-white mb-3">הבקשה עובדה בהצלחה!</h3>
                <p class="text-pink-100/90 mb-7 leading-relaxed text-lg">
                    הגיליון המאוחד נוצר כעת ב-Google Drive שלך.<br>
                    חפש קובץ ששמו מתחיל ב-<b>"Financial Export"</b>.
                </p>
                <a href="https://drive.google.com/drive/recent" target="_blank" 
                    class="inline-block bg-pink-600 hover:bg-pink-700 text-white font-bold py-4 px-12 rounded-full shadow-lg transition-colors text-lg" style="box-shadow: 0 5px 15px rgba(236, 64, 122, 0.4);">
                    צפה בקבצים האחרונים ב-Drive
                </a>
            </div>
        </div>
    </div>

    <script>
        // Use your existing Web App URL
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxiQnCjIO4qLdeadQRdkkAjiRJxLOV2Px7c2gPCD4iCQ9HfVDIS8dH18ClQ_Lv3W_Mn/exec';

        document.getElementById('stockForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const resultArea = document.getElementById('resultArea');

            const payload = {
                tickers: document.getElementById('tickers').value.split(',').map(s => s.trim().toUpperCase()),
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                frequency: document.getElementById('frequency').value
            };

            // Loading State UI
            submitBtn.disabled = true;
            btnText.innerText = "מתקשר עם שרת גוגל...";
            loader.classList.remove('hidden');
            resultArea.classList.add('hidden');

            try {
                // Send data using 'no-cors' to avoid browser CORS preflight blocking
                // The GAS server is set up to handle the data in this manner.
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });

                // Assume success (GAS handles redirections differently so we cannot read the response in no-cors)
                setTimeout(() => {
                    submitBtn.disabled = false;
                    btnText.innerText = "הפק גיליון נתונים";
                    loader.classList.add('hidden');
                    resultArea.classList.remove('hidden');
                    resultArea.scrollIntoView({ behavior: 'smooth' });
                }, 2000);

            } catch (error) {
                console.error("Error sending request:", error);
                alert("אירעה שגיאה בשליחת הבקשה. אנא בדוק את חיבור האינטרנט.");
                submitBtn.disabled = false;
                btnText.innerText = "הפק גיליון נתונים";
                loader.classList.add('hidden');
            }
        });

        // Set Default Dates (Last 30 Days)
        const today = new Date();
        const thirtyDaysAgo = new Date();
        thirtyDaysAgo.setDate(today.getDate() - 30);
        
        document.getElementById('endDate').value = today.toISOString().split('T')[0];
        document.getElementById('startDate').value = thirtyDaysAgo.toISOString().split('T')[0];
    </script>
</body>
</html>
