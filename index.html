<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Reporter | Futuristic Soft Pink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Assistant', sans-serif; 
            background: linear-gradient(135deg, #fffcfd 0%, #f7f9ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(244, 143, 177, 0.3);
            box-shadow: 0 25px 65px rgba(236, 64, 122, 0.1);
        }
        .input-soft {
            background: rgba(255, 255, 255, 0.8);
            border: 1.5px solid #fce4ec;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-soft:focus {
            border-color: #f06292;
            box-shadow: 0 0 15px rgba(240, 98, 146, 0.25);
            background: white;
            outline: none;
        }
        .btn-future-pink {
            background: linear-gradient(45deg, #f06292, #ce93d8);
            box-shadow: 0 10px 25px rgba(240, 98, 146, 0.35);
            transition: all 0.4s ease;
        }
        .btn-future-pink:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 35px rgba(240, 98, 146, 0.45);
            filter: brightness(1.08);
        }
        .btn-future-pink:active { transform: translateY(1px) scale(0.98); }
        
        /* Spinner */
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4">

    <div class="max-w-xl w-full glass-panel rounded-[3.5rem] p-10 md:p-14 text-center border border-white/50">
        <div class="mb-10">
            <div class="inline-flex p-5 bg-pink-50 rounded-full mb-5 shadow-sm border border-pink-100/50">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-pink-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
            </div>
            <h1 class="text-4xl font-bold text-gray-800 tracking-tight">מפיק דוחות מניות</h1>
            <p class="text-pink-500 font-semibold mt-2 uppercase text-sm tracking-widest opacity-70">Direct Local Download • No Drive Storage</p>
        </div>

        <form id="stockForm" class="space-y-8 text-right" dir="rtl">
            <div>
                <label class="block text-gray-600 font-bold mb-2 mr-2">סימולי מניות (AAPL, TSLA...):</label>
                <input type="text" id="tickers" placeholder="הפרד בפסיקים" required
                    class="w-full px-6 py-4 rounded-2xl input-soft text-lg">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-gray-600 font-bold mb-2 mr-2 text-sm">תאריך התחלה:</label>
                    <input type="date" id="startDate" required class="w-full px-4 py-4 rounded-2xl input-soft">
                </div>
                <div>
                    <label class="block text-gray-600 font-bold mb-2 mr-2 text-sm">תאריך סיום:</label>
                    <input type="date" id="endDate" required class="w-full px-4 py-4 rounded-2xl input-soft">
                </div>
            </div>

            <div>
                <label class="block text-gray-600 font-bold mb-2 mr-2">תדירות דגימה:</label>
                <select id="frequency" class="w-full px-4 py-4 rounded-2xl input-soft outline-none bg-white/50 cursor-pointer">
                    <option value="1d">יומי (Daily)</option>
                    <option value="1wk">שבועי (Weekly)</option>
                    <option value="1mo">חודשי (Monthly)</option>
                </select>
            </div>

            <button type="submit" id="submitBtn" 
                class="w-full text-white font-bold py-6 rounded-3xl btn-future-pink text-2xl shadow-lg flex justify-center items-center">
                <span id="btnText">הורד קובץ CSV</span>
                <div id="loader" class="hidden mr-3 loader"></div>
            </button>
        </form>

        <p id="statusMsg" class="mt-8 text-pink-500 font-medium hidden animate-pulse">השרת מעבד את הנתונים, ההורדה תחל בעוד כמה שניות...</p>
    </div>

    <script>
        // ה-URL החדש שסיפקת
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzfikWDypWMT3ivJYbMmrTYbQyA_H47_ari8lHG7pxE7S1IDAaSBU39USY0VZoPehA/exec';

        document.getElementById('stockForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const status = document.getElementById('statusMsg');

            let startDate = document.getElementById('startDate').value;
            let endDate = document.getElementById('endDate').value;

            // בדיקת תאריכים הפוכים
            if (new Date(startDate) > new Date(endDate)) {
                alert("שים לב: תאריך ההתחלה מאוחר מתאריך הסיום. המערכת תסדר זאת עבורך.");
                let temp = startDate;
                startDate = endDate;
                endDate = temp;
            }

            const payload = {
                tickers: document.getElementById('tickers').value.split(',').map(s => s.trim().toUpperCase()),
                startDate: startDate,
                endDate: endDate,
                frequency: document.getElementById('frequency').value
            };

            // מצב טעינה
            btn.disabled = true;
            btnText.innerText = "מעבד...";
            loader.classList.remove('hidden');
            status.classList.remove('hidden');

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                const csvData = await response.text();

                if (csvData.startsWith("Error")) {
                    alert("שגיאה מהשרת: " + csvData);
                } else {
                    // יצירת הורדה מקומית בדפדפן
                    const blob = new Blob([csvData], { type: 'text/csv;charset=utf-8;' });
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.style.display = "none";
                    a.href = url;
                    a.download = `Stock_Report_${payload.tickers[0]}_${new Date().toISOString().split('T')[0]}.csv`;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    status.innerText = "ההורדה הושלמה בהצלחה!";
                }
            } catch (err) {
                alert("שגיאת תקשורת. וודא שהסקריפט מפורסם (Deployed) כ-Anyone.");
            } finally {
                btn.disabled = false;
                btnText.innerText = "הורד קובץ CSV";
                loader.classList.add('hidden');
                setTimeout(() => status.classList.add('hidden'), 5000);
            }
        });

        // הגדרת תאריכי ברירת מחדל
        const today = new Date();
        document.getElementById('endDate').value = today.toISOString().split('T')[0];
        const lastYear = new Date();
        lastYear.setFullYear(today.getFullYear() - 1);
        document.getElementById('startDate').value = lastYear.toISOString().split('T')[0];
    </script>
</body>
</html>
