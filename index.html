<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataFusion Pro | Neon Lilac Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
 
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Assistant', 'sans-serif'] },
                    colors: {
                        cyber: { 
                            bg: '#0f0514', // Very dark purple/black
                            card: 'rgba(30, 15, 45, 0.65)', // Transparent deep purple
                            border: 'rgba(216, 180, 254, 0.15)', // Light lilac border
                            accent: '#d8b4fe', // Lilac
                            accentHover: '#e9d5ff', // Lighter lilac
                            neon: '#c084fc' // Bright purple for glow
                        }
                    },
                    animation: {
                        'slide-in': 'slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'glow-pulse': 'glowPulse 3s infinite alternate'
                    },
                    keyframes: {
                        slideIn: {
                            '0%': { transform: 'translateY(100%) scale(0.9)', opacity: 0 },
                            '100%': { transform: 'translateY(0) scale(1)', opacity: 1 }
                        },
                        glowPulse: {
                            '0%': { boxShadow: '0 0 15px rgba(192, 132, 252, 0.2)' },
                            '100%': { boxShadow: '0 0 30px rgba(192, 132, 252, 0.6)' }
                        }
                    }
                }
            }
        }
    </script>
 
    <style>
        body {
            background-color: #0f0514;
            /* Soft, feminine glowing orbs in the background */
            background-image: 
                radial-gradient(circle at 20% 40%, rgba(192, 132, 252, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 60%, rgba(233, 213, 255, 0.1) 0%, transparent 45%);
            background-attachment: fixed;
            color: #f3e8ff;
        }
        
        .glass-panel {
            background: theme('colors.cyber.card');
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid theme('colors.cyber.border');
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .cyber-input {
            background: rgba(15, 5, 20, 0.5);
            border: 1px solid theme('colors.cyber.border');
            color: #f3e8ff;
            transition: all 0.3s ease;
        }
        
        .cyber-input:focus {
            border-color: theme('colors.cyber.neon');
            box-shadow: 0 0 15px rgba(192, 132, 252, 0.25);
            outline: none;
            background: rgba(30, 15, 45, 0.8);
        }

        /* Feminine scrollbar styling */
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: theme('colors.cyber.accent'); border-radius: 4px; }
        
        ::-webkit-calendar-picker-indicator { filter: invert(0.8) sepia(1) saturate(5) hue-rotate(220deg) brightness(1.2); cursor: pointer; }
        
        .toast-enter { animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col font-sans relative overflow-x-hidden">
 
    <header class="border-b border-purple-300/10 bg-black/30 backdrop-blur-md sticky top-0 z-40">
        <div class="max-w-5xl mx-auto px-4 py-6">
            <h1 class="text-3xl font-bold flex items-center gap-3 text-transparent bg-clip-text bg-gradient-to-r from-purple-300 to-fuchsia-400">
                <i class="fa-solid fa-wand-magic-sparkles text-purple-300"></i>
                DataFusion Pro
            </h1>
            <p class="text-purple-300/60 mt-2 text-sm tracking-widest font-mono uppercase">Financial Data Integration Hub</p>
        </div>
    </header>
 
    <main class="flex-grow max-w-5xl mx-auto px-4 py-10 w-full flex flex-col gap-8">
        
        <div class="glass-panel rounded-[2rem] p-8 md:p-10 transition-all border border-purple-500/20">
            <div class="flex items-center gap-3 mb-8 border-b border-purple-500/10 pb-4">
                <i class="fa-solid fa-sliders text-purple-400 text-xl"></i>
                <h2 class="text-xl font-semibold text-purple-100">הגדרת פרמטרים לייצוא</h2>
            </div>

            <form id="dataForm" class="space-y-8">
                <div>
                    <label for="tickers" class="block text-sm font-bold text-purple-300 mb-3 tracking-wide">סימולי מניות (TICKERS)</label>
                    <input type="text" id="tickers" name="tickers" placeholder="AAPL, TSLA, MSFT..." required
                        class="w-full px-5 py-4 rounded-xl cyber-input font-mono text-lg placeholder-purple-800" dir="ltr">
                </div>
 
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label for="startDate" class="block text-sm font-bold text-purple-300 mb-3 text-right">תאריך התחלה</label>
                        <input type="date" id="startDate" name="startDate" required class="w-full px-5 py-4 rounded-xl cyber-input font-mono">
                    </div>
                    <div>
                        <label for="endDate" class="block text-sm font-bold text-purple-300 mb-3 text-right">תאריך סיום</label>
                        <input type="date" id="endDate" name="endDate" required class="w-full px-5 py-4 rounded-xl cyber-input font-mono">
                    </div>
                    <div>
                        <label for="frequency" class="block text-sm font-bold text-purple-300 mb-3 text-right">תדירות דגימה</label>
                        <select id="frequency" name="frequency" required class="w-full px-5 py-4 rounded-xl cyber-input font-mono appearance-none">
                            <option value="1d" class="bg-cyber-bg text-white">1D (יומי)</option>
                            <option value="1wk" class="bg-cyber-bg text-white">1W (שבועי)</option>
                            <option value="1mo" class="bg-cyber-bg text-white">1M (חודשי)</option>
                        </select>
                    </div>
                </div>
 
                <div class="pt-6">
                    <button type="submit" id="submitBtn" 
                        class="w-full px-10 py-5 bg-gradient-to-r from-purple-500 to-fuchsia-500 hover:from-purple-400 hover:to-fuchsia-400 text-white font-bold text-xl rounded-2xl shadow-lg transition-all transform hover:-translate-y-1 flex items-center justify-center gap-3 animate-glow-pulse border border-fuchsia-300/30">
                        <span>התחל עיבוד נתונים</span>
                        <i class="fa-solid fa-atom"></i>
                    </button>
                </div>
            </form>
        </div>
 
        <div id="resultsSection" class="hidden glass-panel rounded-[2rem] overflow-hidden flex-col border border-purple-500/20">
            <div class="bg-purple-900/30 px-8 py-5 border-b border-purple-500/20 flex justify-between items-center">
                <h2 class="text-lg font-semibold text-purple-200 flex items-center gap-2">
                    <i class="fa-solid fa-table-list text-purple-400"></i> תצוגה מקדימה
                </h2>
                <span class="text-xs bg-purple-900/50 text-purple-300 border border-purple-500/30 px-4 py-1.5 rounded-full font-mono shadow-inner">DATASET HEAD</span>
            </div>
            
            <div class="p-8">
                <div class="overflow-x-auto custom-scrollbar border border-purple-500/10 rounded-xl bg-black/20">
                    <table id="previewTable" class="w-full text-right table-auto">
                        <thead id="tableHead" class="bg-purple-900/20 text-purple-300 text-xs uppercase tracking-wider font-bold border-b border-purple-500/10"></thead>
                        <tbody id="tableBody" class="text-sm text-purple-100 divide-y divide-purple-500/10 font-mono"></tbody>
                    </table>
                </div>
 
                <div class="mt-8 flex flex-col sm:flex-row items-center gap-4">
                    <a id="downloadBtn" href="#" target="_blank"
                        class="w-full sm:w-auto px-10 py-4 bg-purple-600/20 hover:bg-purple-500/30 border border-purple-400/30 text-purple-100 font-bold rounded-xl transition-all flex items-center justify-center gap-3 shadow-[0_0_15px_rgba(192,132,252,0.1)]">
                        <i class="fa-solid fa-cloud-arrow-down text-purple-300 text-lg"></i>
                        <span>הורד קובץ CSV</span>
                    </a>
                    <p class="text-purple-300/50 text-sm flex items-center gap-2 font-mono">
                        <i class="fa-solid fa-check text-purple-400"></i> Cloud sync complete
                    </p>
                </div>
            </div>
        </div>
    </main>
 
    <div id="toastContainer" class="fixed bottom-6 right-6 left-6 md:left-auto md:w-[22rem] z-50 flex flex-col gap-3 pointer-events-none" dir="ltr"></div>
 
    <script>
        // DOM Elements
        const form = document.getElementById('dataForm');
        const submitBtn = document.getElementById('submitBtn');
        const resultsSection = document.getElementById('resultsSection');
        const tableHead = document.getElementById('tableHead');
        const tableBody = document.getElementById('tableBody');
        const downloadBtn = document.getElementById('downloadBtn');
        const toastContainer = document.getElementById('toastContainer');
 
        // Futuristic English Toasts
        function showToast(title, message, type = 'info') {
            const toast = document.createElement('div');
            
            let icon, bgColor, borderColor, textColor;
            if (type === 'success') {
                icon = 'fa-check'; bgColor = 'bg-[rgba(30,15,45,0.95)]'; borderColor = 'border-purple-400/50'; textColor = 'text-purple-300';
            } else if (type === 'error') {
                icon = 'fa-triangle-exclamation'; bgColor = 'bg-[rgba(45,15,30,0.95)]'; borderColor = 'border-pink-500/50'; textColor = 'text-pink-400';
            } else {
                icon = 'fa-atom fa-spin'; bgColor = 'bg-[rgba(30,15,45,0.95)]'; borderColor = 'border-fuchsia-400/50'; textColor = 'text-fuchsia-300';
            }

            toast.className = `pointer-events-auto backdrop-blur-xl border ${borderColor} ${bgColor} p-5 rounded-2xl shadow-[0_10px_30px_rgba(0,0,0,0.5)] flex items-start gap-4 toast-enter`;
            
            toast.innerHTML = `
                <div class="${textColor} mt-0.5 text-lg"><i class="fa-solid ${icon}"></i></div>
                <div class="flex-1">
                    <h4 class="text-white font-bold text-sm tracking-wider uppercase">${title}</h4>
                    <p class="text-purple-200/70 text-xs mt-1.5 font-mono leading-relaxed">${message}</p>
                </div>
                ${type !== 'loading' ? `<button onclick="this.parentElement.remove()" class="text-purple-500/50 hover:text-purple-300 transition-colors"><i class="fa-solid fa-xmark"></i></button>` : ''}
            `;
            
            toastContainer.appendChild(toast);

            if (type !== 'loading') {
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateY(15px) scale(0.95)';
                    toast.style.transition = 'all 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
                    setTimeout(() => toast.remove(), 400);
                }, 6000);
            }
            
            return toast;
        }
 
        // Backend API
        const API_URL = 'https://script.google.com/macros/s/AKfycbwv7pYAPI8x0FJsuMsGyUW2Bwh-oBXXaiaYn5wD2pnjX7FiIsJSj5cNZNHQRsR4D4so/exec';
 
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            resultsSection.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-atom fa-spin"></i><span>מעבד נתונים...</span>';
            submitBtn.classList.remove('animate-glow-pulse');
            submitBtn.classList.add('opacity-80');
 
            const loadingToast = showToast('INITIALIZING SEQUENCE', 'Establishing secure connection to financial data nodes. Please wait...', 'loading');
 
            const tickers = document.getElementById('tickers').value.split(',').map(t => t.trim().toUpperCase()).filter(t => t);
            const payload = {
                tickers: tickers,
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                frequency: document.getElementById('frequency').value
            };
 
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload),
                    redirect: 'follow'
                });
 
                if (!response.ok) throw new Error(`Network Node Offline (Code: ${response.status})`);
                const data = await response.json();
 
                loadingToast.remove();

                if (data.status === 'success') {
                    showToast('DATA FUSION COMPLETE', 'Time-series data successfully merged and normalized. Payload ready for download.', 'success');
                    renderTable(data.previewData);
                    downloadBtn.href = data.downloadUrl;
                    resultsSection.classList.remove('hidden');
                    resultsSection.classList.add('flex');
                } else {
                    throw new Error(data.message || 'Unknown exception encountered in data layer.');
                }
            } catch (err) {
                loadingToast.remove();
                showToast('SYSTEM EXCEPTION', err.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>התחל עיבוד נתונים</span><i class="fa-solid fa-atom"></i>';
                submitBtn.classList.add('animate-glow-pulse');
                submitBtn.classList.remove('opacity-80');
            }
        });
 
        function renderTable(data) {
            tableHead.innerHTML = ''; tableBody.innerHTML = '';
            if (!data || data.length === 0) return;
 
            const headerRow = document.createElement('tr');
            data[0].forEach(h => {
                const th = document.createElement('th');
                th.className = 'px-6 py-5 font-mono tracking-wider';
                th.innerHTML = `<span dir="ltr">${h}</span>`;
                headerRow.appendChild(th);
            });
            tableHead.appendChild(headerRow);
 
            data.slice(1, 6).forEach(row => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-purple-500/10 transition-colors duration-300';
                row.forEach((cell, i) => {
                    const td = document.createElement('td');
                    td.className = 'px-6 py-4 border-l border-purple-500/5 first:border-l-0';
                    td.innerHTML = `<span dir="ltr">${i > 0 && cell !== "" ? parseFloat(cell).toFixed(2) : cell}</span>`;
                    tr.appendChild(td);
                });
                tableBody.appendChild(tr);
            });
        }
 
        window.addEventListener('DOMContentLoaded', () => {
            const today = new Date();
            const yearAgo = new Date(); yearAgo.setFullYear(today.getFullYear() - 1);
            document.getElementById('endDate').valueAsDate = today;
            document.getElementById('startDate').valueAsDate = yearAgo;
        });
    </script>
</body>
</html>
